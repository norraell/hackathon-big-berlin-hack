# Podman-compatible docker-compose file with ngrok for Twilio integration
# Usage: podman-compose -f docker-compose.podman.yml up
#
# This setup exposes the local application via ngrok so Twilio can send
# webhooks to your local machine for testing phone calls.

services:
  postgres:
    image: postgres:16-alpine
    container_name: claims-postgres
    environment:
      POSTGRES_USER: claims_user
      POSTGRES_PASSWORD: claims_password
      POSTGRES_DB: claims_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claims_user -d claims_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: claims-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://claims_user:claims_password@postgres:5432/claims_db
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ngrok:
    image: ngrok/ngrok:latest
    container_name: claims-ngrok
    restart: unless-stopped
    command:
      - "http"
      - "app:8000"
      - "--log=stdout"
    ports:
      - "4040:4040"  # ngrok web interface
    environment:
      # Set your ngrok auth token here or via .env file
      # Get your token from: https://dashboard.ngrok.com/get-started/your-authtoken
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    depends_on:
      - app

volumes:
  postgres_data:

# Podman-specific network configuration
networks:
  default:
    driver: bridge